# Configurazione completa con tutte le metriche
#
# modalità dati disponibili:
#   mode: queue   -> polling da Queue interna (stesso processo)
#   mode: redis   -> Redis Pub/Sub (processo separato)
#   mode: rabbit  -> RabbitMQ fanout exchange (processo separato)

dashboard:
  mode: rabbit         # Cambiare in 'rabbit' per usare RabbitMQ
  redis:
    host: localhost
    port: 6379
    db: 0
    channel: trades_export_redis

  rabbit:
    host: rabbitmq.af.tst
    port: 5672
    user: mqclient
    password: Mqclient-00
    virtual_host: TestCredEQEtf
    exchange: trades_rabbit_credit


  metrics:
    enabled: true
    items:       # Trade nostri
    # Trade di mercato
      - lagged_spread_pl_sum       # P&L totale (colorato verde/rosso)
      - ctv_sum
      - lagged_spread_pl_marginality
      - my_lagged_spread_pl_sum
      - my_ctv_sum
      - my_lagged_spread_pl_marginality

logging:
  path: "logs/dashboard.log"
  level: DEBUG
  log_name: dashboard

app:
  style: Fusion

queue:
  maxsize: 5000
