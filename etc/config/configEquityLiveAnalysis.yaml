load_strategy_info:
      package_path: C:\AFMachineLearning\Libraries\MarketMonitor\user_strategy\equity\LiveAnalysis
      module_name: EtfEquityLiveAnalysis
      class_name: EtfEquityLiveAnalysis


market_monitor:

  path_db: Z:\etf_equity_anagraphic_db.sqlite
  bloomberg_subscription_config_path: C:\AFMachineLearning\Libraries\MarketMonitor\etc\config\bbg_subscription\config_bloomberg_subscription.yaml
  price_source: "kafka"

  rabbit_data_export:
    activate: true      # Impostare true (e redis activate: false) per usare RabbitMQ
    rabbit_params:
      rabbit_host: 'rabbitmq.af.tst'
      rabbit_port: 5672
      rabbit_user: 'mqclient'
      rabbit_password: 'Mqclient-00'
      rabbit_vhost: 'TestCredEQEtf'
      channel_rabbit: trades_rabbit

  redis_data_export:
    channel_redis: trades_test
    activate: true       # Impostare false se si usa rabbit_data_distributor
    redis_params:
      redis_host: 'localhost'
      redis_port: 6379
      redis_db: 0


  tasks:
    update_HF:
      activate: true
      frequency: 2
    update_LF:
      activate: true
      frequency: 60
    trade:
      activate: true
      synchronous: true
      frequency: 1

    command_listener:
      activate: true
      frequency: 3

bloomberg_data_distributor:
  activate: true
  interval: 1


kafka_data_distributor:
  activate: true
  kafka_params:
    bootstrap_servers: "aftstserver51.af.pre:9092,aftstserver52.af.pre:9092,aftstserver53.af.pre:9092"
    schema_registry_url: "http://aftstserver51.af.pre:8081"
    start_mode: "latest"  # oppure "earliest"


trade_distributor:
  activate: true
#  path: C:\AFMachineLearning\Libraries\MarketMonitor\etc\marketrades.db
  path: "C:\\Users\\gbs09316\\Documents\\marketTradeFolder\\markettrades.db"

redis_data_distributor:
  activate: true       # Impostare false se si usa rabbit_data_distributor
  redis_params:
    redis_host: 'localhost'
    redis_port: 6379
    redis_db: 0


logging:
  log_level: INFO
  log_level_console: WARNING
  log_name: LiveAnalysis.log


control_panel:
  title: "ETF Equity Trade Analysis"
  commands:
    - label: "switch to Bloomberg"
      action: "switch_to_bloomberg"
      payload: {}
      description: "switch from kafka to bloomberg"

    - label: "switch to kafka"
      action: "switch_to_kafka"
      payload: {}
      description: "switch bloomberg kafka to kafka"

