load_strategy_info:
      package_path: C:\AFMachineLearning\Libraries\MarketMonitor\user_strategy\desk_bond
      module_name: VTVFutAnalysis
      class_name: VTVFutAnalysis


market_monitor:

  price_source: "kafka"

  rabbit_data_export:
    activate: true      # Impostare true (e redis activate: false) per usare RabbitMQ
    rabbit_params:
      rabbit_host: 'rabbitmq.af.tst'
      rabbit_port: 5672
      rabbit_user: 'mqclient'
      rabbit_password: 'Mqclient-00'
      rabbit_vhost: 'TestCredEQEtf'
      channel_rabbit: trades_rabbit

  redis_data_export:
    channel_redis: trades_df
    activate: true       # Impostare false se si usa rabbit_data_distributor
    redis_params:
      redis_host: 'localhost'
      redis_port: 6379
      redis_db: 0


  trade_manager:
    show_my_trades: True
    time_zero_lag: [5, 10, 30, 60]

  tasks:
    update_HF:
      activate: true
      frequency: 2
    update_LF:
      activate: true
      frequency: 60
    trade:
      activate: true
      synchronous: true
      frequency: 1

bloomberg_data_distributor:
  activate: true
  interval: 1


kafka_data_distributor:
  activate: true
  kafka_params:
    bootstrap_servers: "aftstserver51.af.tst:9092,aftstserver52.af.tst:9092,aftstserver53.af.tst:9092"
    schema_registry_url: "http://aftstserver51.af.tst:8081"
    start_mode: "latest"  # oppure "earliest"


trade_distributor:
  activate: false
#  path: C:\AFMachineLearning\Libraries\MarketMonitor\etc\marketrades.db
  path: "C:\\Users\\gbs09316\\Documents\\marketTradeFolder\\markettrades.db"

redis_data_distributor:
  activate: true       # Impostare false se si usa rabbit_data_distributor
  redis_params:
    redis_host: 'localhost'
    redis_port: 6379
    redis_db: 0

logging:
  log_level: DEBUG
  log_level_console: WARNING
  log_name: LiveAnalysisVTV.log


